name: build SB 113

on:
  workflow_dispatch:

env:
  VERSION: v1.13.4
  TAG_WINDOWS: with_quic,with_utls,with_gvisor,with_dhcp,with_wireguard,with_tailscale,with_acme,with_naive_outbound,with_purego,with_ccm,with_ocm,with_clash_api,badlinkname,tfogo_checklinkname0
  TAG_WINDOWS_LITE: with_quic,with_utls,with_gvisor,with_naive_outbound,with_purego,with_clash_api,badlinkname,tfogo_checklinkname0
  TAG_WINDOWS_ALL: with_quic,with_utls,with_gvisor,with_dhcp,with_wireguard,with_tailscale,with_acme,with_naive_outbound,with_purego,with_ccm,with_ocm,with_clash_api,with_grpc,with_v2ray_api,badlinkname,tfogo_checklinkname0

  TAG_LINUX: with_quic,with_utls,with_gvisor,with_dhcp,with_wireguard,with_tailscale,with_acme,with_naive_outbound,with_purego,with_ccm,with_ocm,with_clash_api,badlinkname,tfogo_checklinkname0
  TAG_LINUX_LITE: with_quic,with_utls,with_gvisor,with_naive_outbound,with_purego,with_clash_api,badlinkname,tfogo_checklinkname0
  TAG_LINUX_ALL: with_quic,with_utls,with_gvisor,with_dhcp,with_wireguard,with_tailscale,with_acme,with_naive_outbound,with_purego,with_ccm,with_ocm,with_clash_api,with_grpc,with_v2ray_api,badlinkname,tfogo_checklinkname0

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        amd: [v1, v2, v3]
        flavor: [normal, lite, all]

    steps:
    - uses: actions/setup-go@v5
      with:
        go-version: ~1.25.8
        # go-version: ^1.25
        # check-latest: true # Always check for the latest patch release
        cache: false

    - name: Clone sing-box
      run: git clone -b ${{ env.VERSION }} https://github.com/SagerNet/sing-box

    - name: Build Windows (CGO=0)
      working-directory: sing-box
      run: |
        export GOOS=windows
        export GOARCH=amd64
        export GOAMD64=${{ matrix.amd }}
        export CGO_ENABLED=0

        # Select TAG set
        if [ "${{ matrix.flavor }}" = "normal" ]; then
          TAGS="${{ env.TAG_WINDOWS }}"
        elif [ "${{ matrix.flavor }}" = "lite" ]; then
          TAGS="${{ env.TAG_WINDOWS_LITE }}"
        else
          TAGS="${{ env.TAG_WINDOWS_ALL }}"
        fi

        # Output filename
        OUT="sing-box-${{ matrix.amd }}"
        [ "${{ matrix.flavor }}" = "lite" ] && OUT="${OUT}-lite"
        [ "${{ matrix.flavor }}" = "all" ] && OUT="${OUT}-all"
        OUT="${OUT}.exe"

        # Set build version string
        VERSION_STR="${VERSION}-${{ matrix.amd }}"
        [ "${{ matrix.flavor }}" = "lite" ] && VERSION_STR="${VERSION_STR}-lite"
        [ "${{ matrix.flavor }}" = "all" ] && VERSION_STR="${VERSION_STR}-all"

        # Build sing-box
        go build -v -trimpath -tags "$TAGS" -o "$OUT" -ldflags "-X github.com/sagernet/sing-box/constant.Version=${VERSION_STR} -X internal/godebug.defaultGODEBUG=multipathtcp=0 -checklinkname=0" ./cmd/sing-box
        mkdir -p ../output
        cp "$OUT" ../output/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sing-box-${{ matrix.amd }}-${{ matrix.flavor }}
        path: output/*
        if-no-files-found: error
        retention-days: 1


  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release_files
        merge-multiple: true

    - name: Set TAG_DATE
      run: echo "TAG_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: sb-${{ env.VERSION }}-${{ env.TAG_DATE }}
        files: release_files/*
        draft: false
        prerelease: true
        make_latest: false

    # - name: Delete all artifacts
    #   uses: geekyeggo/delete-artifact@v4
    #   with:
    #     name: |
    #       sing-box-v1-normal
    #       sing-box-v1-lite
    #       sing-box-v1-all
    #       sing-box-v2-normal
    #       sing-box-v2-lite
    #       sing-box-v2-all
    #       sing-box-v3-normal
    #       sing-box-v3-lite
    #       sing-box-v3-all

    
