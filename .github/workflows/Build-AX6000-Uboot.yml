name: Build AX6000 Uboot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get update
        sudo -E apt-get install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler qemu-user-static

    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/hanwckf/bl-mt798x.git

    - name: Space show before
      run: df -hT

    - name: Build Uboot AX6000
      run: |
        cd bl-mt798x

        # 指定 U-Boot 和 ATF 源码目录
        sed -i \
          -e 's|^UBOOT_DIR=.*$|UBOOT_DIR=uboot-mtk-20220606|' \
          -e 's|^ATF_DIR=.*$|ATF_DIR=atf-20220606-637ba581b|' \
          build.sh

        # 输出实际采用的目录，便于检查 Actions 日志
        echo "Current build.sh configuration:"
        grep -E '^(UBOOT_DIR|ATF_DIR)=' build.sh

        # 确认目录存在
        test -d uboot-mtk-20220606
        test -d atf-20220606-637ba581b

        # 编译 AX6000 多分区版本
        SOC=mt7986 BOARD=redmi_ax6000 MULTI_LAYOUT=1 ./build.sh

    - name: Set variables
      run: |
        echo "TAG_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
      shell: bash

    - name: Package Firmware
      run: |
        tar -zcvf Redmi-AX6000-Uboot-${{ env.TAG_DATE }}.tar.gz bl-mt798x/output

    - name: Space show after
      run: df -hT

    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: Redmi-AX6000-Uboot-${{ env.TAG_DATE }}
        file: Redmi-AX6000-Uboot-${{ env.TAG_DATE }}.tar.gz
        asset_name: Redmi-AX6000-Uboot-${{ env.TAG_DATE }}.tar.gz
        prerelease: true
        overwrite: false
